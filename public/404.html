<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // Save the intended path and redirect to index.html
    // The main app will read it back from sessionStorage and restore the route
    var path = window.location.pathname.replace('/petroamid-web', '') || '/';
    var search = window.location.search;
    var hash = window.location.hash;
    sessionStorage.setItem('spa-redirect', path + search + hash);
    window.location.replace('/petroamid-web/');
  </script>
</head>
<body>Redirecting…</body>
</html>
